<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Loading...</title>
</head>
<body>
    <script>
        // CONFIGURATION: Apne GitHub Hosted JSON ka Raw URL yahaan dalein
        const GITHUB_JSON_URL = "https://raw.githubusercontent.com/ydvaditya20-creator/Apk-by-cloud-control-json-file/refs/heads/main/data.json";

        async function fetchAndRenderAll() {
            try {
                const response = await fetch(GITHUB_JSON_URL);
                if (!response.ok) {
                    console.error("GitHub se data nahi mila. Status:", response.status);
                    return;
                }
                
                const data = await response.json();

                // 1. Head clear karein taaki purani styles/meta bilkul saaf ho jayein
                document.head.innerHTML = '<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">';

                // 2. Set Page Title
                if (data.head && data.head.title) {
                    document.title = data.head.title;
                }

                // 3. Inject Meta Tags
                if (data.head && data.head.meta) {
                    data.head.meta.forEach(metaData => {
                        const meta = document.createElement('meta');
                        Object.keys(metaData).forEach(key => meta.setAttribute(key, metaData[key]));
                        document.head.appendChild(meta);
                    });
                }

                // 4. Inject External CSS Links (Sahi Order ke liye Promise Use Kiya Hai)
                if (data.css && data.css.external) {
                    for (const href of data.css.external) {
                        await new Promise((resolve) => {
                            const link = document.createElement('link');
                            link.rel = 'stylesheet';
                            link.href = href;
                            link.onload = resolve;
                            link.onerror = resolve; // Agar link fail ho tab bhi page na ruke
                            document.head.appendChild(link);
                        });
                    }
                }

                // 5. Inject Internal CSS Styles (External CSS ke humesha BAAD mein aani chahiye)
                if (data.css && data.css.internal) {
                    data.css.internal.forEach(cssText => {
                        const style = document.createElement('style');
                        style.textContent = cssText;
                        document.head.appendChild(style);
                    });
                }

                // 6. Body ka sara data override karein
                if (data.body && data.body.html) {
                    document.body.innerHTML = data.body.html;
                }

                // 7. Inject External Scripts
                if (data.script && data.script.external) {
                    for (const src of data.script.external) {
                        await new Promise((resolve) => {
                            const script = document.createElement('script');
                            script.src = src;
                            script.async = false;
                            script.onload = resolve;
                            script.onerror = resolve;
                            document.body.appendChild(script);
                        });
                    }
                }

                // 8. Inject Internal Scripts
                if (data.script && data.script.internal) {
                    data.script.internal.forEach(jsText => {
                        const script = document.createElement('script');
                        script.textContent = jsText;
                        document.body.appendChild(script);
                    });
                }

            } catch (error) {
                console.error("Rendering mein error aaya:", error);
            }
        }

        // DOM tayar hote hi immediate execution
        window.addEventListener('DOMContentLoaded', fetchAndRenderAll);
  // Har 5 second mein background data refresh karne ke liye loop function
setInterval(async function() {
    console.log("Auto-refreshing content from GitHub...");
    await fetchAndRenderAll();
}, 5000);

  
    </script>
</body>
</html>
